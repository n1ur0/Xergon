name: Relay Release

on:
  push:
    tags:
      - 'relay/v*'

env:
  CARGO_TERM_COLOR: always
  IMAGE_NAME: ghcr.io/n1ur0/xergon-relay
  REGISTRY: ghcr.io

jobs:
  # ── Build & Push ────────────────────────────────────────────────────────────
  release:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        run: echo "VERSION=${GITHUB_REF#refs/tags/relay/v}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=sha,prefix=,separator=-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./xergon-relay
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=min

      - name: Image digest
        run: echo "Digest: ${{ steps.build.outputs.digest }}"

  # ── Create GitHub Release ────────────────────────────────────────────────────
  create-release:
    name: Create GitHub Release
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref }}
          name: Relay ${{ github.ref }}
          generate_release_notes: true
          files: ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
