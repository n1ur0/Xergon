name: Release

on:
  push:
    tags: ['v*']

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Build matrix ──────────────────────────────────────────────────────────
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact_suffix: x86_64-unknown-linux-musl
            use_cross: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            artifact_suffix: aarch64-unknown-linux-musl
            use_cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact_suffix: x86_64-apple-darwin
            use_cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact_suffix: aarch64-apple-darwin
            use_cross: false

    steps:
      - uses: actions/checkout@v6

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      # ── Toolchain ──
      - uses: dtolnay/rust-toolchain@stable
        if: "! matrix.use_cross"
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --locked --git https://github.com/cross-rs/cross

      # ── Cache ──
      - name: Cache cargo registry & build
        if: "! matrix.use_cross"
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            xergon-agent/target
            xergon-relay/target
          key: release-${{ matrix.target }}-${{ hashFiles('xergon-agent/Cargo.lock', 'xergon-relay/Cargo.lock') }}
          restore-keys: |
            release-${{ matrix.target }}-

      # ── Build ──
      - name: Build xergon-agent
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cd xergon-agent && cross build --release --target ${{ matrix.target }}
          else
            cd xergon-agent && cargo build --release --target ${{ matrix.target }}
          fi

      - name: Build xergon-relay
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cd xergon-relay && cross build --release --target ${{ matrix.target }}
          else
            cd xergon-relay && cargo build --release --target ${{ matrix.target }}
          fi

      # ── Package ──
      - name: Package artifacts
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          TARGET="${{ matrix.artifact_suffix }}"
          STAGING="staging/${TARGET}"
          mkdir -p "$STAGING"

          # Copy binaries
          cp xergon-agent/target/${{ matrix.target }}/release/xergon-agent "$STAGING/"
          cp xergon-relay/target/${{ matrix.target }}/release/xergon-relay "$STAGING/"
          chmod +x "$STAGING/xergon-agent" "$STAGING/xergon-relay"

          # Copy config examples
          cp xergon-agent/config.toml.example "$STAGING/"
          cp xergon-relay/config.toml.example "$STAGING/"

          # Create per-binary archives
          cd staging
          tar czf "xergon-agent-${VERSION}-${TARGET}.tar.gz" -C "$TARGET" xergon-agent config.toml.example
          mv "$TARGET/config.toml.example" "$TARGET/config.toml.example.relay"
          tar czf "xergon-relay-${VERSION}-${TARGET}.tar.gz" -C "$TARGET" xergon-relay config.toml.example.relay
          mv "$TARGET/config.toml.example.relay" "$TARGET/config.toml.example"

          # Generate SHA256 checksums
          sha256sum "xergon-agent-${VERSION}-${TARGET}.tar.gz" > "xergon-agent-${VERSION}-${TARGET}.tar.gz.sha256"
          sha256sum "xergon-relay-${VERSION}-${TARGET}.tar.gz" > "xergon-relay-${VERSION}-${TARGET}.tar.gz.sha256"

          echo "Packaged for ${TARGET}:"
          ls -lh *.tar.gz*

      # ── Upload ──
      - name: Upload agent artifact
        uses: actions/upload-artifact@v4
        with:
          name: xergon-agent-${{ matrix.artifact_suffix }}
          path: staging/xergon-agent-${{ steps.version.outputs.VERSION }}-${{ matrix.artifact_suffix }}.tar.gz*

      - name: Upload relay artifact
        uses: actions/upload-artifact@v4
        with:
          name: xergon-relay-${{ matrix.artifact_suffix }}
          path: staging/xergon-relay-${{ steps.version.outputs.VERSION }}-${{ matrix.artifact_suffix }}.tar.gz*

  # ── Create Release ────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate combined checksums
        working-directory: dist
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          echo "# SHA256 Checksums for ${VERSION}" > "xergon-${VERSION}-checksums.txt"
          echo "" >> "xergon-${VERSION}-checksums.txt"
          echo "Generated on $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> "xergon-${VERSION}-checksums.txt"
          echo "" >> "xergon-${VERSION}-checksums.txt"
          sha256sum *.tar.gz >> "xergon-${VERSION}-checksums.txt"
          echo ""
          echo "Combined checksums:"
          cat "xergon-${VERSION}-checksums.txt"

      - name: List release assets
        working-directory: dist
        run: ls -lh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.version.outputs.VERSION }}
          files: |
            dist/*.tar.gz
            dist/*.sha256
            dist/xergon-${{ steps.version.outputs.VERSION }}-checksums.txt
          generate_release_notes: true

  # ── Docker Builds ─────────────────────────────────────────────────────────
  docker-relay:
    name: Docker (relay)
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./xergon-relay
          file: ./xergon-relay/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/xergon-relay:latest
            ghcr.io/${{ github.repository }}/xergon-relay:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-agent:
    name: Docker (agent)
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./xergon-agent
          file: ./xergon-agent/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/xergon-agent:latest
            ghcr.io/${{ github.repository }}/xergon-agent:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-marketplace:
    name: Docker (marketplace)
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./xergon-marketplace
          file: ./xergon-marketplace/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/xergon-marketplace:latest
            ghcr.io/${{ github.repository }}/xergon-marketplace:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
