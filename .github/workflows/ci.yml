name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry & build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            xergon-agent/target
            xergon-relay/target
          key: ci-lint-${{ runner.os }}-${{ hashFiles('xergon-agent/Cargo.lock', 'xergon-relay/Cargo.lock') }}
          restore-keys: |
            ci-lint-${{ runner.os }}-

      # ── Format ──
      - name: Check formatting (relay)
        working-directory: xergon-relay
        run: cargo fmt --all -- --check

      - name: Check formatting (agent)
        working-directory: xergon-agent
        run: cargo fmt --all -- --check

      # ── Clippy ──
      - name: Clippy (relay)
        working-directory: xergon-relay
        run: cargo clippy --all-targets -- -D warnings

      - name: Clippy (agent)
        working-directory: xergon-agent
        run: cargo clippy --all-targets -- -D warnings

  # ── Test ──────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            xergon-agent/target
            xergon-relay/target
          key: ci-test-${{ runner.os }}-${{ hashFiles('xergon-agent/Cargo.lock', 'xergon-relay/Cargo.lock') }}
          restore-keys: |
            ci-test-${{ runner.os }}-

      - name: Test (relay)
        working-directory: xergon-relay
        run: cargo test

      - name: Test (agent)
        working-directory: xergon-agent
        run: cargo test

  # ── Build ─────────────────────────────────────────────────────────────────
  build:
    name: Build (release)
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            xergon-agent/target
            xergon-relay/target
          key: ci-build-${{ runner.os }}-${{ hashFiles('xergon-agent/Cargo.lock', 'xergon-relay/Cargo.lock') }}
          restore-keys: |
            ci-build-${{ runner.os }}-

      - name: Build (relay)
        working-directory: xergon-relay
        run: cargo build --release

      - name: Build (agent)
        working-directory: xergon-agent
        run: cargo build --release

  # ── Contract Lint ─────────────────────────────────────────────────────────
  contract-lint:
    name: Contract Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check contract files exist
        run: |
          echo "=== Checking root contracts ==="
          EXPECTED_ROOT="provider_box.ergo treasury.ergo usage_proof.ergo user_staking.ergo gpu_rental.es usage_commitment.es relay_registry.es gpu_rating.es gpu_rental_listing.es payment_bridge.es provider_slashing.ergo governance_proposal.ergo"
          MISSING=""
          for f in $EXPECTED_ROOT; do
            if [ ! -f "contracts/$f" ]; then
              echo "MISSING: contracts/$f"
              MISSING="$MISSING contracts/$f"
            fi
          done
          if [ -n "$MISSING" ]; then
            echo "ERROR: Missing root contract files:$MISSING"
            exit 1
          fi
          echo "All 12 root contracts present"

          echo ""
          echo "=== Checking agent-only contract sources ==="
          if [ ! -f "xergon-agent/contracts/provider_registration.es" ]; then
            echo "MISSING: xergon-agent/contracts/provider_registration.es"
            exit 1
          fi
          echo "Agent-only contract source present"

          echo ""
          echo "=== Checking compiled hex files ==="
          EXPECTED_HEX="provider_box.hex provider_registration.hex treasury_box.hex usage_proof.hex user_staking.hex gpu_rental.hex usage_commitment.hex relay_registry.hex gpu_rating.hex gpu_rental_listing.hex payment_bridge.hex provider_slashing.hex governance_proposal.hex"
          MISSING_HEX=""
          for f in $EXPECTED_HEX; do
            if [ ! -f "xergon-agent/contracts/compiled/$f" ]; then
              echo "MISSING: xergon-agent/contracts/compiled/$f"
              MISSING_HEX="$MISSING $f"
            fi
          done
          if [ -n "$MISSING_HEX" ]; then
            echo "ERROR: Missing compiled hex files:$MISSING_HEX"
            exit 1
          fi
          echo "All 13 compiled hex files present"

          echo ""
          echo "=== Validating hex file contents ==="
          ERRORS=""
          for f in xergon-agent/contracts/compiled/*.hex; do
            CONTENT=$(cat "$f" | tr -d '[:space:]')
            if [ -z "$CONTENT" ]; then
              echo "ERROR: Empty hex file: $f"
              ERRORS="$ERRORS $f"
            elif ! echo "$CONTENT" | grep -qE '^[0-9a-fA-F]+$'; then
              echo "ERROR: Invalid hex in: $f (starts with: $(echo "$CONTENT" | head -c 20))"
              ERRORS="$ERRORS $f"
            fi
          done
          if [ -n "$ERRORS" ]; then
            echo "ERRORS in hex files:$ERRORS"
            exit 1
          fi
          echo "All hex files valid"

          echo ""
          echo "=== Checking agent contract sync ==="
          SYNC_MAP="user_staking.ergo:user_staking.es treasury.ergo:treasury_box.es provider_box.ergo:provider_box.es usage_proof.ergo:usage_proof.es provider_slashing.ergo:provider_slashing.es governance_proposal.ergo:governance_proposal.es"
          for pair in $SYNC_MAP; do
            ROOT_FILE="contracts/${pair%%:*}"
            AGENT_FILE="xergon-agent/contracts/${pair##*:}"
            if ! diff -q "$ROOT_FILE" "$AGENT_FILE" > /dev/null 2>&1; then
              echo "SYNC ERROR: $ROOT_FILE and $AGENT_FILE have diverged"
              echo "  Run: cp $ROOT_FILE $AGENT_FILE"
              exit 1
            fi
            echo "  SYNCED: $ROOT_FILE <-> $AGENT_FILE"
          done
          echo "All contracts in sync"

  # ── Security Audit ────────────────────────────────────────────────────────
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ci-audit-${{ runner.os }}-${{ hashFiles('xergon-agent/Cargo.lock', 'xergon-relay/Cargo.lock') }}

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Audit relay
        working-directory: xergon-relay
        run: cargo audit

      - name: Audit agent
        working-directory: xergon-agent
        run: cargo audit

  # ── Marketplace ───────────────────────────────────────────────────────────
  xergon-marketplace:
    name: Marketplace (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: xergon-marketplace
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: xergon-marketplace/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
        env:
          RELAY_URL: http://127.0.0.1:9090

  # ── SDK Tests ────────────────────────────────────────────────────────────
  xergon-sdk:
    name: SDK Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: xergon-sdk
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: xergon-sdk/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit --skipLibCheck 2>&1 | tail -30

      - name: Test
        run: npx vitest run
