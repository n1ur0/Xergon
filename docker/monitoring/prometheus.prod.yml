# Prometheus scrape configuration for Xergon Network -- PRODUCTION
#
# Uses internal Docker service names (all on xergon-net bridge network).
# No need for host.docker.internal -- services discover each other by name.

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

scrape_configs:
  # ---------------------------------------------------------------------------
  # Xergon Agent metrics
  # ---------------------------------------------------------------------------
  - job_name: "xergon-agent"
    scrape_interval: 15s
    metrics_path: "/api/metrics"
    static_configs:
      - targets:
          - "xergon-agent:9099"
        labels:
          component: agent
    sample_limit: 10000

  # ---------------------------------------------------------------------------
  # Xergon Relay metrics
  # ---------------------------------------------------------------------------
  - job_name: "xergon-relay"
    scrape_interval: 15s
    metrics_path: "/v1/metrics"
    static_configs:
      - targets:
          - "xergon-relay:9090"
        labels:
          component: relay
    sample_limit: 10000

  # ---------------------------------------------------------------------------
  # Ergo Node (optional -- only scrapes if the ergo-node profile is running)
  # ---------------------------------------------------------------------------
  - job_name: "ergo-node"
    scrape_interval: 30s
    metrics_path: "/metrics"
    static_configs:
      - targets:
          - "ergo-node:9053"
        labels:
          component: ergo-node
    sample_limit: 5000
    # Gracefully skip if ergo-node is not running
    scrape_timeout: 5s

  # ---------------------------------------------------------------------------
  # Prometheus self-monitoring
  # ---------------------------------------------------------------------------
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
