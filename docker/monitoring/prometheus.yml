# Prometheus scrape configuration for Xergon Network
#
# Scrape targets:
#   - xergon-agent: /api/metrics (default port 9099)
#   - xergon-relay: /v1/metrics (default port 8080)
#
# For production, replace localhost with your actual host IPs.
# For multiple providers, add multiple job entries.

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

scrape_configs:
  # Xergon Agent metrics
  - job_name: 'xergon-agent'
    scrape_interval: 15s
    metrics_path: '/api/metrics'
    static_configs:
      - targets:
        - 'host.docker.internal:9099'  # Replace with agent IP
        labels:
          component: agent
    # Retry failed scrapes (agent may restart during updates)
    sample_limit: 10000

  # Xergon Relay metrics
  - job_name: 'xergon-relay'
    scrape_interval: 15s
    metrics_path: '/v1/metrics'
    static_configs:
      - targets:
        - 'host.docker.internal:8080'  # Replace with relay IP
        labels:
          component: relay
    sample_limit: 10000

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
