global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alerts.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          # - alertmanager:9093

scrape_configs:
  - job_name: "xergon-agent"
    metrics_path: "/api/metrics"
    static_configs:
      - targets: ["host.docker.internal:9010"]
    scrape_interval: 10s

  - job_name: "xergon-relay"
    metrics_path: "/v1/metrics"
    static_configs:
      - targets: ["host.docker.internal:9020"]
    scrape_interval: 10s
